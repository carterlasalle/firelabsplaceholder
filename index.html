<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Fire Labs | System Initializing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Teko:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --c-bg: #050505;
            --c-surface: #121212;
            --c-text-main: #e0e0e0;
            --c-text-muted: #555555;
            --c-accent: #ff3c00; /* International Orange */
            --c-grid: rgba(255, 255, 255, 0.03);
            
            --f-display: 'Teko', sans-serif;
            --f-tech: 'Space Mono', monospace;
            
            --ease-out: cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor active */
        }

        body {
            background-color: var(--c-bg);
            color: var(--c-text-main);
            font-family: var(--f-tech);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Background FX --- */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--c-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--c-grid) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 0;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, transparent, rgba(255, 60, 0, 0.08), transparent);
            z-index: 1;
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        /* --- Layout --- */
        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            width: 100%;
            padding: 3rem 4rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
        }

        /* --- Header --- */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--c-grid);
            padding-bottom: 20px;
        }

        .brand-mark {
            font-family: var(--f-display);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--c-text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 12px;
            height: 12px;
            background: var(--c-accent);
            box-shadow: 0 0 15px var(--c-accent);
        }

        .system-status {
            font-size: 0.7rem;
            color: var(--c-text-muted);
            text-align: right;
            line-height: 1.5;
        }

        /* --- Hero Typography --- */
        .hero-section {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-family: var(--f-display);
            font-size: clamp(4rem, 13vw, 11rem);
            line-height: 0.85;
            text-transform: uppercase;
            font-weight: 500;
            margin-left: -0.05em;
            color: var(--c-text-main);
            mix-blend-mode: lighten;
        }

        .title-line {
            display: block;
            overflow: hidden;
        }

        .title-line span {
            display: block;
            transform: translateY(100%);
            animation: revealText 1s var(--ease-out) forwards;
        }

        .title-line:nth-child(1) span { animation-delay: 0.1s; }
        .title-line:nth-child(2) span { animation-delay: 0.2s; color: var(--c-accent); }
        .title-line:nth-child(3) span { animation-delay: 0.3s; }

        /* --- Coming Soon Module --- */
        .status-module {
            grid-column: 1 / 2;
            grid-row: 3;
            align-self: end;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1s;
        }

        .status-header {
            font-size: 0.75rem;
            color: var(--c-accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.05em;
        }

        .blink-tag {
            animation: blink 1s steps(2, start) infinite;
            background: var(--c-accent);
            color: #000;
            padding: 2px 6px;
            font-weight: 700;
            font-size: 0.65rem;
        }

        .progress-container {
            width: 100%;
            max-width: 300px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--c-accent);
            box-shadow: 0 0 10px var(--c-accent);
            animation: loadProgress 4s ease-out forwards 1.2s;
        }

        .status-details {
            font-size: 0.7rem;
            color: var(--c-text-muted);
        }

        /* --- Mission Statement --- */
        .mission-statement {
            grid-column: 2 / 3;
            grid-row: 3;
            align-self: end;
            text-align: right;
            border-right: 2px solid var(--c-accent);
            padding-right: 2rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1.4s;
        }

        .mission-text {
            font-size: 1rem;
            line-height: 1.5;
            max-width: 400px;
            margin-left: auto;
            color: var(--c-text-main);
        }

        .mission-label {
            display: block;
            font-size: 0.7rem;
            color: var(--c-text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* --- Custom Cursor --- */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }

        .cursor-dot {
            width: 4px;
            height: 4px;
            background-color: var(--c-accent);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* --- Animations --- */
        @keyframes revealText {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            20% { width: 45%; }
            50% { width: 60%; }
            100% { width: 85%; } /* Stalls at 85% to indicate 'Coming Soon' */
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .main-wrapper {
                padding: 2rem;
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto auto;
                gap: 2rem;
            }
            
            .mission-statement {
                grid-column: 1 / -1;
                grid-row: 3;
                text-align: left;
                border-right: none;
                border-left: 2px solid var(--c-accent);
                padding-right: 0;
                padding-left: 1.5rem;
                margin-left: 0;
            }

            .mission-text {
                margin-left: 0;
            }

            .status-module {
                grid-column: 1 / -1;
                grid-row: 4;
            }
        }
    </style>
</head>
<body>

    <!-- Texture & Grid -->
    <div class="texture-overlay"></div>
    <div class="grid-lines"></div>
    <div class="scan-line"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <div class="main-wrapper">
        <!-- Header -->
        <header>
            <div class="brand-mark">
                <div class="brand-icon"></div>
                PFL // SYS.01
            </div>
            <div class="system-status">
                SECURE CONNECTION<br>
                <span id="clock">00:00:00 UTC</span>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero-section">
            <h1>
                <div class="title-line"><span>Phoenix</span></div>
                <div class="title-line"><span>Fire</span></div>
                <div class="title-line"><span>Labs</span></div>
            </h1>
        </section>

        <!-- Coming Soon Module -->
        <div class="status-module">
            <div class="status-header">
                <span class="blink-tag">LIVE</span>
                DEPLOYMENT IMMINENT
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="status-details">
                SYSTEM INITIALIZATION: 85% COMPLETE<br>
                ESTIMATED ARRIVAL: COMING SOON
            </div>
        </div>

        <!-- Mission Statement -->
        <div class="mission-statement">
            <span class="mission-label">Objective</span>
            <p class="mission-text">
                Building innovative, fast, and reliable solutions to Firefighting and Firefighting ICP.
            </p>
        </div>
    </div>

    <script>
        // Cursor Logic
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // UTC Clock
        function updateTime() {
            const now = new Date();
            const timeString = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
